<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>La Tronçonneuse de Poche - Sélection de catégorie</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10B981", // Adjusted to match user's neon green request, though theme config said #10b748. Going with a bright green that fits the "neon" description.
                        "background-light": "#f6f8f6",
                        "background-dark": "#0F172A", // User requested #0F172A
                        "surface-dark": "#1E293B", // User requested #1E293B for cards
                        "surface-hover": "#334155",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {

  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col overflow-x-hidden pb-20">
<!-- Header -->
<div class="flex items-center p-4 justify-between sticky top-0 z-10 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold flex-1 text-center">Sélectionnez une catégorie</h2>
<div class="size-10"></div> <!-- Spacer for centering -->
</div>
<!-- Random Mode Toggle -->
<div class="flex items-center gap-4 px-4 py-4 justify-between border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center rounded-lg bg-slate-200 dark:bg-surface-dark shrink-0 size-10 text-primary">
<span class="material-symbols-outlined">shuffle</span>
</div>
<div class="flex flex-col">
<p class="text-base font-semibold leading-tight">Mode aléatoire</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Toutes les catégories confondues</p>
</div>
</div>
<div class="shrink-0">
<label class="relative flex h-8 w-14 cursor-pointer items-center rounded-full bg-slate-700 p-1 transition-colors duration-300" id="toggle-label">
<div class="h-6 w-6 rounded-full bg-white shadow-sm transition-transform duration-300" id="toggle-knob"></div>
<input class="invisible absolute" type="checkbox" onchange="const l=document.getElementById('toggle-label'),k=document.getElementById('toggle-knob');if(this.checked){l.style.backgroundColor='#10B981';k.style.transform='translateX(1.5rem)'}else{l.style.backgroundColor='';k.style.transform='translateX(0)'}"/>
</label>
</div>
</div>
<!-- Level Selector -->
<div class="px-4 py-4">
<div class="flex h-12 flex-1 items-center justify-center rounded-xl bg-slate-200 dark:bg-surface-dark p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center rounded-lg px-2 has-[:checked]:bg-primary has-[:checked]:text-white text-white text-sm font-semibold transition-colors">
<span class="truncate">Niveau 1</span>
<input checked="" class="invisible w-0 absolute" name="level" type="radio" value="1"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center rounded-lg px-2 opacity-60 text-white text-sm font-semibold">
<span class="truncate flex items-center gap-1">Niveau 2 <span class="material-symbols-outlined text-[16px]">lock</span></span>
<input class="invisible w-0 absolute" disabled="" name="level" type="radio" value="2"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center rounded-lg px-2 opacity-60 text-white text-sm font-semibold">
<span class="truncate flex items-center gap-1">Niveau 3 <span class="material-symbols-outlined text-[16px]">lock</span></span>
<input class="invisible w-0 absolute" disabled="" name="level" type="radio" value="3"/>
</label>
</div>
</div>
<!-- Categories Grid -->
<div class="grid grid-cols-2 gap-4 p-4 flex-1">
<!-- Card 1 -->
<button onclick="toggleCard(this)" class="cat-card bg-white dark:bg-surface-dark rounded-xl p-4 flex flex-col gap-3 text-left border-2 border-slate-200 dark:border-slate-700 relative overflow-hidden group hover:border-primary/50 transition-all duration-200">
<div class="absolute top-2 right-2 text-primary played-badge">
<span class="material-symbols-outlined fill" style="font-size:20px">check_circle</span>
</div>
<div class="mb-1"><img src="../Visuels-source/categories/defense.svg" alt="Défense" class="w-10 h-10" style="transform: scaleX(-1)"></div>
<div>
<h3 class="font-bold text-sm leading-tight mb-1">Défense</h3>
<p class="text-xs text-slate-500 dark:text-slate-400">10 cartes</p>
</div>
<div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5 mt-auto">
<div class="bg-primary h-1.5 rounded-full" style="width: 100%"></div>
</div>
</button>

<div class="mb-1"><img src="../Visuels-source/categories/energie.svg" alt="Énergie" class="w-10 h-10"></div>
<div>

</div>

<div class="mb-1"><img src="../Visuels-source/categories/sante.svg" alt="Santé" class="w-10 h-10"></div>

</div>

<div class="mb-1"><img src="../Visuels-source/categories/social.svg" alt="Social" class="w-10 h-10"></div>
<div>

<div class="mb-1"><img src="../Visuels-source/categories/educuation.svg" alt="Éducation" class="w-10 h-10"></div>

</button>
<!-- Card 6 -->
<button onclick="toggleCard(this)" class="cat-card bg-white dark:bg-surface-dark rounded-xl p-4 flex flex-col gap-3 text-left border-2 border-slate-200 dark:border-slate-700 relative overflow-hidden group hover:border-primary/50 transition-all duration-200">
<div class="mb-1"><img src="../Visuels-source/categories/justice.svg" alt="Justice" class="w-10 h-10"></div>

<!-- Card 8 -->

<div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5 mt-auto">

</div>
</button>
</div>
<!-- Bottom Action Button -->
<div class="fixed bottom-[72px] left-0 right-0 p-4 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/90 dark:via-background-dark/90 to-transparent pt-8">
<button class="w-full bg-primary hover:bg-primary/90 text-slate-900 font-bold text-lg py-4 rounded-xl shadow-[0_0_20px_rgba(16,185,129,0.4)] transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined fill">play_arrow</span>
            Lancer la session
        </button>
</div>
<!-- Bottom Navigation Bar -->
<div class="fixed bottom-0 left-0 right-0 flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-surface-dark px-4 pb-safe pt-2 h-[72px] z-50">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill">play_circle</span>
<p class="text-[10px] font-bold tracking-wide">Jouer</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-medium tracking-wide">Profil</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 transition-colors" href="#">
<span class="material-symbols-outlined">emoji_events</span>

</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 transition-colors" href="#">
<span class="material-symbols-outlined">info</span>
<p class="text-[10px] font-medium tracking-wide">À propos</p>
</a>
</div>
<script>
function toggleCard(btn) {
  const isSelected = btn.classList.toggle('selected');
  const hasPlayed = btn.querySelector('.played-badge');
  if (isSelected) {
    btn.style.borderColor = '#10B981';
    btn.style.boxShadow = '0 0 12px rgba(16,185,129,0.3), inset 0 0 0 1px rgba(16,185,129,0.1)';
    btn.style.transform = 'scale(0.97)';
    if (!hasPlayed) {
      const check = document.createElement('div');
      check.className = 'absolute top-2 right-2 text-primary select-check';
      check.innerHTML = '<span class="material-symbols-outlined" style="font-size:20px">check</span>';
      btn.appendChild(check);
    }
  } else {
    btn.style.borderColor = '';
    btn.style.boxShadow = '';
    btn.style.transform = '';
    const check = btn.querySelector('.select-check');
    if (check) check.remove();
  }
}
</script>
</body></html>
